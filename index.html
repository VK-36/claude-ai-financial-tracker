<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - VK FinanceHub</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a0f;
  font-family: Arial, sans-serif;
  color: #fff;
}

.login-box {
  background: #12121a;
  padding: 40px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #252535;
  background: #1a1a26;
  color: white;
}

input:focus {
  outline: none;
  border-color: #7c6af7;
}

button {
  width: 100%;
  padding: 10px;
  background: #7c6af7;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #9480ff;
}

.signup-btn {
  background: transparent;
  border: 1px solid #7c6af7;
  margin-top: 10px;
}

.error {
  color: #f06e7a;
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>VK FinanceHub</h2>

  <input type="email" id="email" placeholder="Family Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button class="signup-btn" onclick="signup()">Create Account</button>

  <div class="error" id="error-msg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// 🔥 Your Firebase Config (same as index.html)
const firebaseConfig = {
  apiKey: "AIzaSyCUDzMXoGN8_lHs9PihH_68hjSfE1IxPk4",
  authDomain: "vk-36-9d21a.firebaseapp.com",
  projectId: "vk-36-9d21a",
  storageBucket: "vk-36-9d21a.firebasestorage.app",
  messagingSenderId: "83904901211",
  appId: "1:83904901211:web:02131b004620461b2ccf7e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(err => {
      document.getElementById("error-msg").innerText = err.message;
    });
}

// 🆕 SIGNUP (use once for family account)
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Family account created! Now login.");
    })
    .catch(err => {
      document.getElementById("error-msg").innerText = err.message;
    });
}

// 🔄 AUTO REDIRECT IF ALREADY LOGGED IN
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "dashboard.html";
  }
});
</script>

</body>
</html>
