<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - VK Finance Hub</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0a0a0f;
  font-family: Arial, sans-serif;
  color: #fff;
}

.login-box {
  background: #12121a;
  padding: 40px;
  border-radius: 12px;
  width: 320px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
  text-align: center;
  margin-bottom: 25px;
}

input, button {
  width: 100%;
  height: 42px;           /* SAME HEIGHT */
  padding: 0 12px;        /* remove vertical padding difference */
  margin: 10px 0;
  border-radius: 8px;
  box-sizing: border-box; /* ensures equal sizing */
  font-size: 14px;
}

/* Keep styles separate but size consistent */
button {
  background: #7c6af7;
  border: none;
  color: white;
  cursor: pointer;
}

.signup-btn {
  background: transparent;
  border: 1px solid #7c6af7;
}

.error {
  color: #f06e7a;
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
}

.logo {
  width: 100px;
  height: 100px;
  object-fit: contain;
  display: block;
  margin: 0 auto 15px auto; /* center + space below */
}
  
</style>
</head>

<body>

<div class="login-box">
  <img src="logo.png" class="logo">
  <h2>VK Finance Hub</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button class="signup-btn" onclick="signup()">Create Account</button>

  <div class="error" id="error-msg"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
// 🔥 Your Firebase Config (same as index.html)
const firebaseConfig = {
  apiKey: "AIzaSyCUDzMXoGN8_lHs9PihH_68hjSfE1IxPk4",
  authDomain: "vk-36-9d21a.firebaseapp.com",
  projectId: "vk-36-9d21a",
  storageBucket: "vk-36-9d21a.firebasestorage.app",
  messagingSenderId: "83904901211",
  appId: "1:83904901211:web:02131b004620461b2ccf7e"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔐 LOGIN
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "index.html";
    })
    .catch(err => {
      document.getElementById("error-msg").innerText = err.message;
    });
}

// 🆕 SIGNUP (use once for family account)
function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Account created! Now login.");
    })
    .catch(err => {
      document.getElementById("error-msg").innerText = err.message;
    });
}

// 🔄 AUTO REDIRECT IF ALREADY LOGGED IN
auth.onAuthStateChanged(user => {
  if (user) {
    window.location.href = "dashboard.html";
  }
});
</script>

</body>
</html>
